name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  pint:
    name: Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-php

      - name: Run Pint
        run: ./vendor/bin/pint --test

  larastan:
    name: Larastan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-php

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse

  rector:
    name: Rector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-php

      - name: Run Rector
        run: ./vendor/bin/rector process --dry-run

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-php

      - name: Prepare Laravel application
        run: cp .env.testing .env

      - name: Run tests
        run: ./vendor/bin/pest -p

  lint-openapi:
    name: Validate OpenAPI docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6

      - name: Install Redocly CLI
        run: npm install --no-save @redocly/cli@latest

      - name: Run Redocly lint
        run: |
          npx redocly lint openapi.yaml \
            --extends recommended \
            --format github-actions \
            --max-problems 500 \
            --lint-config error

  validate-elephpants-data:
    name: Validate elePHPants data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate schema
        uses: dsanders11/json-schema-validate-action
        with:
          schema: resources/data/elephpants.schema.json
          files: resources/data/elephpants.json

      - name: Check for duplicate IDs
        run: |
          dup=$(jq -r '.elephpants[].id' resources/data/elephpants.json | sort | uniq -d)
          if [[ -n "$dup" ]]; then
            echo "Duplicate IDs found in resources/data/elephpants.json: $dup"
            exit 1
          else
            echo "All IDs in elephpants.json are unique 👍"
            exit 0
          fi
